<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">컨포트랩 제조 AI 에이전트 조치 루프</title>
  <desc id="desc">이상 감지, 맥락 수집, 원인 설명, 담당자 조치, 학습 데이터 회수로 이어지는 제조 AI 에이전트 루프</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f9fa"/>
      <stop offset="1" stop-color="#e8f0f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#071013" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="72" y="88" fill="#111416" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="36" font-weight="900">제조 AI 에이전트가 실제로 줄여야 할 일</text>
  <text x="72" y="132" fill="#53616a" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="19" font-weight="700">답변 생성보다 중요한 것은 확인, 배정, 조치 기록을 닫힌 루프로 만드는 것입니다.</text>
  <circle cx="600" cy="356" r="174" fill="#ffffff" stroke="#d4e0e4" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="600" cy="356" r="86" fill="#111416"/>
  <text x="600" y="346" text-anchor="middle" fill="#a7dc37" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="22" font-weight="900">CONPORTLAB</text>
  <text x="600" y="382" text-anchor="middle" fill="#ffffff" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="26" font-weight="900">AI Agent</text>
  <g filter="url(#shadow)" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">
    <g transform="translate(92 238)">
      <rect width="244" height="106" rx="8" fill="#ffffff" stroke="#d5e0e4"/>
      <text x="24" y="45" fill="#00a7d8" font-size="17" font-weight="900">01 DETECT</text>
      <text x="24" y="76" fill="#111416" font-size="23" font-weight="900">이상 감지</text>
    </g>
    <g transform="translate(862 238)">
      <rect width="244" height="106" rx="8" fill="#ffffff" stroke="#d5e0e4"/>
      <text x="24" y="45" fill="#00a7d8" font-size="17" font-weight="900">02 CONTEXT</text>
      <text x="24" y="76" fill="#111416" font-size="23" font-weight="900">맥락 수집</text>
    </g>
    <g transform="translate(92 426)">
      <rect width="244" height="106" rx="8" fill="#ffffff" stroke="#d5e0e4"/>
      <text x="24" y="45" fill="#00a7d8" font-size="17" font-weight="900">04 RECORD</text>
      <text x="24" y="76" fill="#111416" font-size="23" font-weight="900">조치 기록</text>
    </g>
    <g transform="translate(862 426)">
      <rect width="244" height="106" rx="8" fill="#a7dc37"/>
      <text x="24" y="45" fill="#071013" font-size="17" font-weight="900">03 ACT</text>
      <text x="24" y="76" fill="#071013" font-size="23" font-weight="900">원인·조치 제안</text>
    </g>
  </g>
  <g fill="none" stroke="#00a7d8" stroke-width="4" stroke-linecap="round" opacity=".9">
    <path d="M338 294C418 228 512 196 600 196"/>
    <path d="M862 294C782 228 688 196 600 196"/>
    <path d="M862 478C782 540 688 574 600 574"/>
    <path d="M338 478C418 540 512 574 600 574"/>
  </g>
  <text x="72" y="612" fill="#53616a" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="18" font-weight="800">AI 에이전트의 성과는 답변 수가 아니라 원인 확인 시간, 보고 시간, 반복 조치 누락률로 봐야 합니다.</text>
</svg>
