<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">컨포트랩 제조 데이터 플랫폼 연결 흐름</title>
  <desc id="desc">설비 신호, 게이트웨이, 노코드 운영 화면, 제조 AI 분석으로 이어지는 데이터 흐름 다이어그램</desc>
  <defs>
