      <stop offset="0" stop-color="#061114"/>
      <stop offset="0.55" stop-color="#0b2730"/>
      <stop offset="1" stop-color="#101416"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#00a7d8"/>
      <stop offset="1" stop-color="#a7dc37"/>
