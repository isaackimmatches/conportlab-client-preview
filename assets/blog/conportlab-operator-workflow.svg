<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">제조 AI 에이전트 운영자 워크플로우</title>
  <desc id="desc">현장 운영자가 이상 알림, 데이터 확인, AI 제안, 조치 기록을 순서대로 처리하는 화면 흐름</desc>
  <rect width="1200" height="675" fill="#f5f8f9"/>
  <text x="72" y="88" fill="#101416" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="36" font-weight="900">운영자가 실제로 쓰는 AI 워크플로우</text>
  <text x="72" y="130" fill="#5b6770" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="19" font-weight="700">대시보드는 보여주는 데서 끝나지 않고 조치 기록까지 이어져야 합니다.</text>
  <g transform="translate(72 188)">
    <rect width="1056" height="396" rx="8" fill="#fff" stroke="#d8e4e7"/>
    <g transform="translate(34 34)">
      <rect width="228" height="328" rx="8" fill="#071013"/>
      <text x="24" y="54" fill="#a7dc37" font-size="18" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-weight="900">알림</text>
      <text x="24" y="106" fill="#fff" font-size="28" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-weight="900">불량률 상승</text>
      <text x="24" y="154" fill="#b7c3c8" font-size="18" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-weight="700">3라인, 최근 2시간</text>
      <text x="24" y="190" fill="#b7c3c8" font-size="18" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-weight="700">평균 대비 +18%</text>
    </g>
    <g transform="translate(304 34)">
      <rect width="228" height="328" rx="8" fill="#edf4f6"/>
      <text x="24" y="54" fill="#0089a6" font-size="18" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-weight="900">데이터 확인</text>
      <text x="24" y="106" fill="#101416" font-size="27" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-weight="900">로트·설비·작업자</text>
      <rect x="24" y="150" width="176" height="20" rx="4" fill="#b7dce5"/>
      <rect x="24" y="190" width="124" height="20" rx="4" fill="#d4e1e5"/>
      <rect x="24" y="230" width="154" height="20" rx="4" fill="#d4e1e5"/>
    </g>
    <g transform="translate(574 34)">
      <rect width="228" height="328" rx="8" fill="#edf4f6"/>
      <text x="24" y="54" fill="#0089a6" font-size="18" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-weight="900">AI 제안</text>
      <text x="24" y="106" fill="#101416" font-size="27" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-weight="900">원인 후보 3개</text>
      <text x="24" y="156" fill="#536169" font-size="18" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-weight="800">1. 냉각수 온도 편차</text>
      <text x="24" y="194" fill="#536169" font-size="18" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-weight="800">2. 신규 로트 투입</text>
      <text x="24" y="232" fill="#536169" font-size="18" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-weight="800">3. 금형 점검 지연</text>
    </g>
    <g transform="translate(844 34)">
      <rect width="178" height="328" rx="8" fill="#a7dc37"/>
      <text x="24" y="54" fill="#071013" font-size="18" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-weight="900">조치 기록</text>
      <text x="24" y="106" fill="#071013" font-size="27" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-weight="900">확인</text>
      <text x="24" y="146" fill="#071013" font-size="27" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-weight="900">배정</text>
      <text x="24" y="186" fill="#071013" font-size="27" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-weight="900">완료</text>
    </g>
    <g fill="none" stroke="#00a7d8" stroke-width="5" stroke-linecap="round">
      <path d="M262 198H304M532 198H574M802 198H844"/>
    </g>
  </g>
</svg>
