<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">컨포트랩 브랜드 SEO 체크리스트</title>
  <desc id="desc">컨포트랩 브랜드 검색을 위해 제목, 본문, 이미지, 내부 링크, 사이트맵을 점검하는 SEO 체크리스트</desc>
  <rect width="1200" height="675" fill="#f7fafb"/>
  <text x="72" y="88" fill="#101416" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="36" font-weight="900">컨포트랩 브랜드 SEO 체크리스트</text>
  <text x="72" y="130" fill="#5b6770" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="19" font-weight="700">검색엔진이 브랜드와 제조 AI 주제를 같은 문맥으로 이해하도록 페이지 단위 신호를 맞춥니다.</text>
  <g transform="translate(72 190)" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">
    <rect width="1056" height="388" rx="8" fill="#fff" stroke="#d6e1e4"/>
    <g transform="translate(44 44)">
      <circle cx="20" cy="20" r="20" fill="#a7dc37"/>
      <path d="M11 21l7 7 14-17" fill="none" stroke="#071013" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="58" y="29" fill="#101416" font-size="28" font-weight="900">고유한 제목과 H1</text>
      <text x="58" y="67" fill="#5b6770" font-size="18" font-weight="700">컨포트랩, 제조 데이터 플랫폼, AI 품질관리 같은 핵심어를 페이지마다 다르게 배치합니다.</text>
    </g>
    <g transform="translate(44 136)">
      <circle cx="20" cy="20" r="20" fill="#a7dc37"/>
      <path d="M11 21l7 7 14-17" fill="none" stroke="#071013" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="58" y="29" fill="#101416" font-size="28" font-weight="900">본문 첫 문단의 브랜드 맥락</text>
      <text x="58" y="67" fill="#5b6770" font-size="18" font-weight="700">회사명과 문제 해결 키워드를 억지 반복이 아닌 설명 문장 안에 넣습니다.</text>
    </g>
    <g transform="translate(44 228)">
      <circle cx="20" cy="20" r="20" fill="#00a7d8"/>
      <path d="M11 21l7 7 14-17" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="58" y="29" fill="#101416" font-size="28" font-weight="900">이미지 alt와 내부 링크</text>
      <text x="58" y="67" fill="#5b6770" font-size="18" font-weight="700">검색로봇이 읽을 수 있는 설명형 alt와 표준 a 링크로 글, 사례, 상담 CTA를 연결합니다.</text>
    </g>
    <g transform="translate(44 320)">
      <circle cx="20" cy="20" r="20" fill="#00a7d8"/>
      <path d="M11 21l7 7 14-17" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="58" y="29" fill="#101416" font-size="28" font-weight="900">canonical, sitemap, 구조화 데이터</text>
      <text x="58" y="67" fill="#5b6770" font-size="18" font-weight="700">대표 URL과 BlogPosting, FAQPage, BreadcrumbList를 함께 제공해 수집 신뢰도를 높입니다.</text>
    </g>
  </g>
</svg>
